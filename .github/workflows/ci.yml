# GitHub Actions CI/CD Pipeline
# Runs on every push and pull request to main branch
# All tests run inside Docker container for consistency

name: CI Pipeline

on:
  push:
    branches: [milestone3]
  pull_request:
    branches: [milestone3]

jobs:
  # Job 1: Build Docker image (shared across all jobs)
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            -t skincare-api:${{ github.sha }} \
            -f src/ragpipeline/Dockerfile \
            src/ragpipeline/

      - name: Save Docker image
        run: |
          docker save skincare-api:${{ github.sha }} -o /tmp/skincare-api.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: skincare-api-image
          path: /tmp/skincare-api.tar
          retention-days: 1

  # Job 2: Run linting and formatting checks
  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: skincare-api-image
          path: /tmp

      - name: Load Docker image
        run: |
          docker load -i /tmp/skincare-api.tar

      - name: Run Black formatter check
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app -e PYTHONPATH=/app/src skincare-api:${{ github.sha }} black --check --line-length 120 src/ragpipeline/
        continue-on-error: false

      - name: Run Flake8 linter
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app -e PYTHONPATH=/app/src skincare-api:${{ github.sha }} flake8 --max-line-length=120 --extend-ignore=E203,W503 src/ragpipeline/
        continue-on-error: true

  # Job 3: Run unit tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: skincare-api-image
          path: /tmp

      - name: Load Docker image
        run: |
          docker load -i /tmp/skincare-api.tar

      - name: Run unit tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e PYTHONPATH=/app/src \
            -e GOOGLE_GENAI_USE_VERTEXAI=false \
            -e GCP_PROJECT=test-project \
            -e BUCKET_NAME=test-bucket \
            -e RAG_CORPUS=test-corpus \
            skincare-api:${{ github.sha }} \
            pytest tests/unit/ -v --tb=short

      - name: Generate coverage report
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -v ${{ github.workspace }}/coverage:/app/coverage \
            -w /app \
            -e PYTHONPATH=/app/src \
            -e GOOGLE_GENAI_USE_VERTEXAI=false \
            -e GCP_PROJECT=test-project \
            -e BUCKET_NAME=test-bucket \
            -e RAG_CORPUS=test-corpus \
            skincare-api:${{ github.sha }} \
            pytest tests/unit/ tests/integration/ \
            --cov=ragpipeline \
            --cov=main \
            --cov=runner \
            --cov-report=term \
            --cov-report=xml \
            --cov-report=html:coverage \
            --cov-fail-under=50
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-unit
          path: coverage/
        if: always()

  # Job 4: Run integration tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: skincare-api-image
          path: /tmp

      - name: Load Docker image
        run: |
          docker load -i /tmp/skincare-api.tar

      - name: Run integration tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e PYTHONPATH=/app/src \
            -e GOOGLE_GENAI_USE_VERTEXAI=false \
            -e GCP_PROJECT=test-project \
            -e BUCKET_NAME=test-bucket \
            -e RAG_CORPUS=test-corpus \
            skincare-api:${{ github.sha }} \
            pytest tests/integration/ -v --tb=short

  # Job 5: Run system tests
  system-tests:
    name: System Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: skincare-api-image
          path: /tmp

      - name: Load Docker image
        run: |
          docker load -i /tmp/skincare-api.tar

      - name: Start API server container
        run: |
          docker run -d --name api-server -p 8080:8080 \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e PYTHONPATH=/app/src \
            -e DEV=1 \
            -e GOOGLE_GENAI_USE_VERTEXAI=false \
            -e GCP_PROJECT=test-project \
            -e BUCKET_NAME=test-bucket \
            -e RAG_CORPUS=test-corpus \
            skincare-api:${{ github.sha }}
      - name: Wait for server to be ready
        run: |
          echo "Waiting for server to start..."
          for i in $(seq 1 15); do
            if curl -sS -f http://localhost:8080/health; then
              echo "Server ready"; break
            fi
            echo "Waiting... ($i)"; sleep 2
          done
          if ! curl -sS -f http://localhost:8080/health; then
            echo "Server failed to become ready; dumping logs"; docker logs api-server --tail 200; exit 1
          fi

      - name: Run system tests
        run: |
          # Run tests inside the already-started api-server container to avoid host-network issues
          docker exec api-server pytest tests/system/ -v --tb=short
      - name: Show server logs
        if: always()
        run: |
          docker logs api-server

      - name: Stop server container
        if: always()
        run: |
          docker stop api-server || true
          docker rm api-server || true

  # Job 6: Summary
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, system-tests]
    if: always()
    steps:
      - name: Check test results
        id: test-results
        run: |
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "System Tests: ${{ needs.system-tests.result }}"

          if [ "${{ needs.unit-tests.result }}" != "success" ] || [ "${{ needs.integration-tests.result }}" != "success" ] || [ "${{ needs.system-tests.result }}" != "success" ]; then
            echo "❌ Some tests failed!"
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ All tests passed!"
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: Check if Slack webhook is configured
        id: slack-check
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: always() && steps.slack-check.outputs.enabled == 'true'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ steps.test-results.outputs.status == 'success' && '✅ CI Pipeline Passed' || '❌ CI Pipeline Failed' }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ steps.test-results.outputs.status == 'success' && '✅ CI Pipeline Passed' || '❌ CI Pipeline Failed' }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n<${{ github.event.head_commit.url }}|${{ github.sha }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Test Results:*\n• Unit Tests: ${{ needs.unit-tests.result == 'success' && '✅ Passed' || '❌ Failed' }}\n• Integration Tests: ${{ needs.integration-tests.result == 'success' && '✅ Passed' || '❌ Failed' }}\n• System Tests: ${{ needs.system-tests.result == 'success' && '✅ Passed' || '❌ Failed' }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ github.event.head_commit.url }}|View Commit> | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
